# yaml-language-server: $schema=https://raw.githubusercontent.com/zeybek/camouflage.nvim/main/schemas/camouflage-project-config.schema.json
# =============================================================================
# camouflage.nvim - Project Configuration
# =============================================================================
# This file allows you to configure camouflage.nvim settings per-project.
# Place this file in your project root directory.
#
# Config merge precedence (later overrides earlier):
#   1. Plugin defaults
#   2. User config from require('camouflage').setup({...})
#   3. This project config file
#   4. Buffer-local overrides (vim.b.camouflage_*)
# =============================================================================

# Required: Schema version (must be 1)
version: 1

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Enable/disable camouflage globally for this project
enabled: true

# Enable debug logging (shows in :messages)
debug: false

# Automatically apply masking when entering supported buffers
auto_enable: true

# Skip masking for files with more lines than this value (null = no limit)
max_lines: 5000

# =============================================================================
# MASKING STYLE
# =============================================================================

# Masking style: 'stars', 'dotted', 'text', 'scramble'
# Examples:
#   stars:    API_KEY=sk-1234  ->  API_KEY=********
#   dotted:   API_KEY=sk-1234  ->  API_KEY=••••••••
#   text:     API_KEY=sk-1234  ->  API_KEY=************************
#   scramble: API_KEY=sk-1234  ->  API_KEY=s1-k324 (deterministic shuffle)
style: stars

# Character used for 'stars' and 'dotted' styles
mask_char: '*'

# Fixed mask length (null = use actual value length)
# mask_length: 8

# Text shown for 'text' style
hidden_text: '************************'

# =============================================================================
# APPEARANCE
# =============================================================================

# Highlight group for masked text
highlight_group: Comment

# Custom colors (overrides highlight_group when set)
# colors:
#   foreground: '#808080'
#   background: transparent
#   bold: false
#   italic: false

# =============================================================================
# FILE PATTERNS
# =============================================================================

# Define which files should be parsed and with which parser
# Available parsers: env, json, yaml, toml, properties, netrc, xml, http
patterns:
  - file_pattern: ['.env*', '*.env', '.envrc']
    parser: env
  - file_pattern: ['*.sh']
    parser: env
  - file_pattern: ['*.json']
    parser: json
  - file_pattern: ['*.yaml', '*.yml']
    parser: yaml
  - file_pattern: ['*.toml']
    parser: toml
  - file_pattern: ['*.properties', '*.ini', '*.conf', 'credentials']
    parser: properties
  - file_pattern: ['.netrc', '_netrc']
    parser: netrc
  - file_pattern: ['*.xml']
    parser: xml
  - file_pattern: ['*.http']
    parser: http

# =============================================================================
# CUSTOM PATTERNS
# =============================================================================

# Define custom patterns for file types not supported by built-in parsers
# Uses Lua patterns with capture groups
#
# Example:
# custom_patterns:
#   - file_pattern: '*.rest'
#     pattern: '@([%w_]+)%s*=%s*(.+)'
#     key_capture: 1
#     value_capture: 2
custom_patterns: []

# =============================================================================
# PARSER SETTINGS
# =============================================================================

# Parser-specific configuration
parsers:
  # Include commented lines in parsing (all parsers)
  include_commented: true

  # ENV parser settings
  env:
    include_commented: true
    include_export: true

  # JSON parser settings
  json:
    max_depth: 10

  # YAML parser settings
  yaml:
    max_depth: 10

# =============================================================================
# INTEGRATIONS
# =============================================================================

# Third-party plugin integrations
integrations:
  # Mask values in Telescope preview buffers
  telescope: true

  # nvim-cmp integration
  cmp:
    disable_in_masked: true

# =============================================================================
# WORKSPACE AUDIT
# =============================================================================

# Configuration for :CamouflageAudit
audit:
  # Root-relative or basename globs skipped by workspace audit
  ignore_patterns: ['.git', '.git/**', 'node_modules', 'node_modules/**']

  # Number of files processed per scheduled command chunk
  max_files_per_chunk: 50

  # Default list target: 'quickfix' or 'loclist'
  destination: quickfix

  # Open quickfix/location-list after findings are written
  open: true

  # Show audit completion notifications
  notify: true

# =============================================================================
# RULE-BASED POLICY
# =============================================================================

# Data-only rules for deciding which detected variables should be masked or
# ignored. Policy can only act on values found by supported parsers or custom
# patterns; it does not make unsupported files parseable.
policy:
  enabled: true
  default_action: mask # 'mask' or 'ignore'

  # Terminal path ignores run first. A later rule can override these only when
  # action is 'mask' and allow_force is true.
  terminal_path_ignores:
    - .git/**
    - node_modules/**

  # Rules are evaluated in order and the first non-forced match wins. Matching
  # supports path, basename, parser, key, nested, commented, value_length,
  # value_shape, value_prefix, and value_suffix predicates.
  rules:
    - id: ignore-debug-flags
      action: ignore
      key: ['^DEBUG$', '^PORT$']
      parser: [env, json, yaml]

    - id: force-client-secrets
      action: mask
      allow_force: true
      key:
        - client[_%.%-]?secret
        - private[_%.%-]?key

# =============================================================================
# CHECKS
# =============================================================================

checks:
  # Offline weak-secret heuristic badges.
  # Privacy: values are checked locally only and never sent over the network.
  weak_secret:
    enabled: true
    min_length: 8
    min_sensitive_length: 12
    entropy_threshold: 3.0
    sensitive_key_patterns:
      - password
      - passwd
      - passphrase
      - secret
      - token
      - api[_%-]*key
      - access[_%-]*key
      - private[_%-]*key
      - client[_%-]*secret
      - auth[_%-]*token
      - credential
    ignored_key_patterns: []
    ignored_value_patterns: []
    common_values:
      - password
      - password123
      - secret
      - changeme
      - admin
      - default
      - test
      - qwerty
    show_sign: false
    show_virtual_text: true
    virtual_text_format: '[weak: %s]'
    virtual_text_hl: DiagnosticWarn
    # line_hl: CamouflageWeakSecret

# =============================================================================
# YANK (COPY) FEATURE
# =============================================================================

# Configuration for copying unmasked values
yank:
  # Default register for copying ('+' = system clipboard)
  default_register: '+'

  # Show notification after copying
  notify: true

  # Auto-clear clipboard after N seconds (null = disabled)
  auto_clear_seconds: 30

  # Require confirmation before copying
  confirm: true

  # Confirmation message format (%s = variable key)
  confirm_message: 'Copy value of "%s" to clipboard?'

# =============================================================================
# REVEAL FEATURE
# =============================================================================

# Configuration for temporarily revealing masked values
reveal:
  # Highlight group for revealed values
  highlight_group: CamouflageRevealed

  # Show notification when revealing
  notify: false

  # Auto-reveal values on current line as cursor moves
  follow_cursor: false

# =============================================================================
# HAVE I BEEN PWNED (HIBP) INTEGRATION
# =============================================================================

# Check passwords against the HIBP breach database.
# This is a network check; manual commands are available by default, but
# automatic checks are disabled unless you opt in below.
# Requires: Neovim 0.10+, curl
# Privacy: Uses k-anonymity (only first 5 chars of SHA-1 hash sent)
pwned:
  # Enable the feature and manual commands
  enabled: true

  # Network check passwords on BufEnter (opt in)
  auto_check: false

  # Network check passwords on save (opt in)
  check_on_save: false

  # Network check passwords on text change with debounce (opt in)
  check_on_change: false

  # Show sign column indicator for breached passwords
  show_sign: true

  # Show virtual text with breach count
  show_virtual_text: true

  # Highlight the entire line
  show_line_highlight: true

  # Sign column icon
  sign_text: '!'

  # Sign highlight group
  sign_hl: DiagnosticWarn

  # Virtual text format (%s = breach count, e.g., "52.3M")
  virtual_text_format: 'PWNED (%s)'

  # Virtual text highlight group
  virtual_text_hl: DiagnosticWarn

  # Line highlight group
  line_hl: CamouflagePwned
