name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          failOnWarnings: false
          helpURL: https://www.conventionalcommits.org/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ tests/

  stylua:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting with StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pinned so a new StyLua release can't fail CI on untouched code.
          version: 2.5.2
          args: --check lua/ tests/

  test:
    name: Test (Neovim ${{ matrix.nvim-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Documented floor + a pinned 0.10/0.11 leg + rolling stable/nightly.
        nvim-version: ['v0.9.5', 'v0.10.4', 'v0.11.7', 'stable', 'nightly']
    # nightly tracks an unreleased build and can break for unrelated reasons.
    continue-on-error: ${{ matrix.nvim-version == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 --branch v0.1.4 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/plenary.nvim

      - name: Install nvim-treesitter and grammars
        run: |
          git clone --depth 1 --branch master https://github.com/nvim-treesitter/nvim-treesitter \
            ~/.local/share/nvim/site/pack/vendor/start/nvim-treesitter
          nvim --headless \
            -c "TSInstallSync json yaml toml xml http hcl dockerfile" \
            -c "quitall"

      - name: Run tests
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ {minimal_init = 'tests/minimal_init.lua'}"
